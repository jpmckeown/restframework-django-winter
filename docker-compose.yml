services:
  app:
    container_name: drf
    build:
      context: .
      args:
        - DEV=true
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    command: >
      sh -c "python manage.py wait_for_db && 
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./secrets.env
    environment:
      - DB_HOST=db
      - DB_NAME=devdb
      - DB_USER=devuser
    depends_on:
      - db
  
  db:
    container_name: postgres
    image: postgres:13-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    env_file:
      - ./secrets.env
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=devuser

volumes:
  dev-db-data: